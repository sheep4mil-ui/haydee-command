function selectHaydeeVoice() {
  const voices = window.speechSynthesis?.getVoices() || [];
  if (!voices.length) {
    voiceSelect.innerHTML = '<option value="">No browser voices available</option>';
    voiceSelect.disabled = true;
    return;
  }
  voiceSelect.disabled = false;
  const savedVoice = localStorage.getItem('haydeeVoice') || voiceSelect.value;
  const preferred = ['jenny', 'aria', 'zira', 'sonia', 'samantha', 'hazel', 'susan'];
  const automaticVoice = voices.find((voice) => {
    const name = voice.name.toLowerCase();
    return name.includes('microsoft') && preferred.some((candidate) => name.includes(candidate));
  }) || voices.find((voice) => voice.name.toLowerCase().includes('microsoft') && voice.lang.toLowerCase().startsWith('en'))
    || voices.find((voice) => preferred.some((candidate) => voice.name.toLowerCase().includes(candidate)))
    || voices.find((voice) => voice.lang.toLowerCase().startsWith('en'))
    || null;
  haydeeVoice = voices.find((voice) => voice.name === savedVoice) || automaticVoice;
  voiceSelect.replaceChildren(...voices
    .slice()
    .sort((a, b) => Number(b.lang.toLowerCase().startsWith('en')) - Number(a.lang.toLowerCase().startsWith('en')) || a.name.localeCompare(b.name))
    .map((voice) => {
      const option = document.createElement('option');
      option.value = voice.name;
      option.textContent = `${voice.name} (${voice.lang})`;
      return option;
    }));
  if (haydeeVoice) voiceSelect.value = haydeeVoice.name;
}

function speakAsHaydee(text) {
  if (!voiceRepliesEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  if (haydeeVoice) utterance.voice = haydeeVoice;
  utterance.rate = 0.96;
  utterance.pitch = 1.04;
  utterance.volume = 1;
  window.speechSynthesis.speak(utterance);
}

selectHaydeeVoice();
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = selectHaydeeVoice;
} else {
  voiceRepliesButton.disabled = true;
  voiceRepliesButton.textContent = 'Voice replies unavailable in this browser';
}
voiceSelect.addEventListener('change', () => {
  haydeeVoice = window.speechSynthesis?.getVoices().find((voice) => voice.name === voiceSelect.value) || null;
  if (haydeeVoice) localStorage.setItem('haydeeVoice', haydeeVoice.name);
});
voiceRepliesButton.addEventListener('click', () => {
  voiceRepliesEnabled = !voiceRepliesEnabled;
  voiceRepliesButton.classList.toggle('is-off', !voiceRepliesEnabled);
  voiceRepliesButton.innerHTML = voiceRepliesEnabled
    ? '<span>🔊</span> Voice replies on'
    : '<span>🔇</span> Voice replies off';
  if (!voiceRepliesEnabled) window.speechSynthesis?.cancel();
});

