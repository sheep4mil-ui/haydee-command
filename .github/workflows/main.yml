function resetCharacter() {
  leaveXMode();
  isSquatting = false;
  activeMotionMode = 'idle';
  currentFidget = null;
  nextFidgetAt = idleTime + 2 + Math.random() * 3;
  if (activeAction) activeAction.stop();
  mixer?.setTime(0);
  if (model) model.rotation.y = 0;
  if (model) {
    model.position.copy(modelBasePosition);
    model.rotation.z = 0;
  }
  camera.position.copy(cameraHome);
  controls.target.copy(targetHome);
  controls.update();
  status.textContent = `IDLE v4 // chest-only breathing + natural leg fidgets // ${Object.keys(secondaryBones).length} motion bones`;
  succeed('Character reset.');
}

