function buildRoom(center, height, floorY) {
  room.clear();
  const roomSize = height * 6.5;
  const roomHeight = height * 4.2;
  const walls = new THREE.Mesh(
    new THREE.BoxGeometry(roomSize, roomHeight, roomSize),
    new THREE.MeshStandardMaterial({
      color: '#111625',
      roughness: 0.92,
      metalness: 0.08,
      side: THREE.BackSide,
    }),
  );
  walls.position.set(center.x, floorY + roomHeight * 0.48, center.z);
  room.add(walls);

  const floorGrid = new THREE.GridHelper(roomSize, 28, '#735cff', '#28304c');
  floorGrid.position.set(center.x, floorY + height * 0.002, center.z);
  floorGrid.userData.baseZ = center.z;
  floorGrid.userData.cellSize = roomSize / 28;
  floorGrid.material.transparent = true;
  floorGrid.material.opacity = 0.46;
  room.add(floorGrid);
  animatedFloorGrid = floorGrid;

  const makeWallGrid = (position, rotation) => {
    const grid = new THREE.GridHelper(roomSize, 20, '#664dce', '#252c45');
    grid.position.copy(position);
    grid.rotation.copy(rotation);
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    room.add(grid);
  };
  makeWallGrid(
    new THREE.Vector3(center.x, floorY + roomHeight * 0.48, center.z - roomSize * 0.49),
    new THREE.Euler(Math.PI / 2, 0, 0),
  );
  makeWallGrid(
    new THREE.Vector3(center.x - roomSize * 0.49, floorY + roomHeight * 0.48, center.z),
    new THREE.Euler(Math.PI / 2, 0, Math.PI / 2),
  );

  const lightMaterial = new THREE.MeshBasicMaterial({ color: '#f1edff', toneMapped: false, fog: false });
  const haloMaterial = new THREE.MeshBasicMaterial({
    color: '#765cff',
    transparent: true,
    opacity: 0.5,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    toneMapped: false,
    fog: false,
  });
  const frameMaterial = new THREE.MeshStandardMaterial({ color: '#252b3c', metalness: 0.75, roughness: 0.3 });
  const addWallLight = (x) => {
    const fixture = new THREE.Group();
    const frame = new THREE.Mesh(new THREE.BoxGeometry(height * 0.18, height * 1.3, height * 0.075), frameMaterial);
    const lamp = new THREE.Mesh(new THREE.BoxGeometry(height * 0.085, height * 1.14, height * 0.085), lightMaterial);
    const halo = new THREE.Mesh(new THREE.PlaneGeometry(height * 0.32, height * 1.4), haloMaterial);
    halo.position.z = height * 0.055;
    lamp.position.z = height * 0.09;
    fixture.add(frame, halo, lamp);
    fixture.position.set(x, floorY + height * 1.35, center.z - height * 1.8);
    room.add(fixture);

    const panelLight = new THREE.PointLight('#8d72ff', 18, height * 5.2, 1.35);
    panelLight.position.set(x, floorY + height * 1.35, center.z - height * 1.55);
    room.add(panelLight);

    const beamTarget = new THREE.Object3D();
    beamTarget.position.set(center.x, floorY + height * 0.9, center.z);
    room.add(beamTarget);
    const beam = new THREE.SpotLight('#9b87ff', 32, height * 5.5, Math.PI * 0.28, 0.72, 1.25);
    beam.position.copy(panelLight.position);
    beam.target = beamTarget;
    room.add(beam);
  };
  addWallLight(center.x - height * 0.92);
  addWallLight(center.x + height * 0.92);

  const ceilingFrame = new THREE.Mesh(
    new THREE.BoxGeometry(height * 1.45, height * 0.055, height * 0.5),
    frameMaterial,
  );
  const ceilingLamp = new THREE.Mesh(
    new THREE.BoxGeometry(height * 1.25, height * 0.065, height * 0.32),
    lightMaterial,
  );
  ceilingFrame.position.set(center.x, floorY + roomHeight * 0.965, center.z - height * 0.3);
  ceilingLamp.position.copy(ceilingFrame.position);
  ceilingLamp.position.y -= height * 0.035;
  room.add(ceilingFrame, ceilingLamp);

  const glow = new THREE.PointLight('#765cff', 3.2, roomSize * 1.2, 2);
  glow.position.set(center.x, floorY + height * 1.6, center.z - height * 1.5);
  room.add(glow);
  const overheadGlow = new THREE.PointLight('#e5ddff', 12, roomSize * 0.75, 1.5);
  overheadGlow.position.set(center.x, floorY + roomHeight * 0.86, center.z - height * 0.3);
  room.add(overheadGlow);
}

let model;
