const cameraHome = new THREE.Vector3();
const targetHome = new THREE.Vector3();
const modelCenter = new THREE.Vector3();
const modelBasePosition = new THREE.Vector3();
let modelHeight = 1;
const secondaryBones = {};
const secondaryState = {};
const buttHitBones = [];
const breastHitBones = [];
const faceHitBones = [];
const feetHitBones = [];
const idleShoulders = [];
const idleLegs = {};
let idleChest = null;
let usbAccessory = null;
const motionReferences = { chest: null, hips: null };
const referenceMotion = {
  chest: { ready: false, position: new THREE.Vector3(), velocity: new THREE.Vector3(), quaternion: new THREE.Quaternion(), angularVelocity: 0 },
  hips: { ready: false, position: new THREE.Vector3(), velocity: new THREE.Vector3(), quaternion: new THREE.Quaternion(), angularVelocity: 0 },
};
const motionSample = new THREE.Vector3();
const motionVelocity = new THREE.Vector3();
const motionQuaternion = new THREE.Quaternion();
const motionDeltaQuaternion = new THREE.Quaternion();
const settings = { breast: 0.35, butt: 0.3, stiffness: 0.65, damping: 0.72 };
const modelRaycaster = new THREE.Raycaster();
const modelPointer = new THREE.Vector2();
const hitBoneWorldPosition = new THREE.Vector3();
const hitBoneScreenPosition = new THREE.Vector3();
let modelPointerStart = null;

canvas.addEventListener('pointerdown', (event) => {
  if (event.button !== 0) return;
  modelPointerStart = { x: event.clientX, y: event.clientY };
});

canvas.addEventListener('pointerup', (event) => {
  if (!modelPointerStart || !model || (!buttHitBones.length && !breastHitBones.length && !faceHitBones.length && !feetHitBones.length)) return;
  const movement = Math.hypot(event.clientX - modelPointerStart.x, event.clientY - modelPointerStart.y);
  modelPointerStart = null;
  if (movement > 14 || xmodeVideo.classList.contains('is-visible') || breastModeVideo.classList.contains('is-visible') || faceModeVideo.classList.contains('is-visible') || feetModeVideo.classList.contains('is-visible')) return;

  const rect = canvas.getBoundingClientRect();
  modelPointer.set(
    ((event.clientX - rect.left) / rect.width) * 2 - 1,
    -((event.clientY - rect.top) / rect.height) * 2 + 1,
  );
  model.updateMatrixWorld(true);
  modelRaycaster.setFromCamera(modelPointer, camera);
  const hit = modelRaycaster.intersectObject(model, true).find((intersection) => intersection.object.isMesh);
  if (!hit) return;

  let hitNode = hit.object;
  let hitHeadMesh = false;
  while (hitNode && hitNode !== model) {
    if (hitNode.name.trim().toLowerCase().includes('head')) {
      hitHeadMesh = true;
      break;
    }
    hitNode = hitNode.parent;
  }
  const hitHeadHeight = hit.point.y >= modelCenter.y + modelHeight * 0.31;
  if (hitHeadMesh || hitHeadHeight) { enterFaceMode(); return; }

  const hitsRegion = (bones, radius) => bones.some((bone) => {
    bone.getWorldPosition(hitBoneWorldPosition);
    return hit.point.distanceToSquared(hitBoneWorldPosition) <= radius * radius;
  });
  const hitsScreenRegion = (bones, pixelRadius) => bones.some((bone) => {
    bone.getWorldPosition(hitBoneScreenPosition).project(camera);
    if (hitBoneScreenPosition.z < -1 || hitBoneScreenPosition.z > 1) return false;
    const boneX = rect.left + (hitBoneScreenPosition.x + 1) * rect.width * 0.5;
    const boneY = rect.top + (1 - hitBoneScreenPosition.y) * rect.height * 0.5;
    return Math.hypot(event.clientX - boneX, event.clientY - boneY) <= pixelRadius;
  });
  const breastPixelRadius = Math.max(42, rect.height * 0.07);
  const facePixelRadius = Math.max(46, rect.height * 0.075);
  const hitFace = hitsRegion(faceHitBones, modelHeight * 0.13)
    || hitsScreenRegion(faceHitBones, facePixelRadius);
  if (hitFace) { enterFaceMode(); return; }
  const feetPixelRadius = Math.max(44, rect.height * 0.07);
  const hitFeetHeight = hit.point.y <= modelCenter.y - modelHeight * 0.38;
  const hitFeet = hitFeetHeight
    || hitsRegion(feetHitBones, modelHeight * 0.14)
    || hitsScreenRegion(feetHitBones, feetPixelRadius);
  if (hitFeet) { enterFeetMode(); return; }
  const hitBreast = hitsRegion(breastHitBones, modelHeight * 0.18)
    || hitsScreenRegion(breastHitBones, breastPixelRadius);
  if (hitBreast) { enterBreastMode(); return; }
  const buttPixelRadius = Math.max(52, rect.height * 0.09);
  const hitButt = hitsRegion(buttHitBones, modelHeight * 0.16)
    || hitsScreenRegion(buttHitBones, buttPixelRadius);
  if (hitButt) enterXMode();
});

canvas.addEventListener('pointercancel', () => { modelPointerStart = null; });

new GLTFLoader().load(
  publicAsset('models/haydee_animated.glb?v=weighted-glute-walk-71'),
  (gltf) => {
    model = gltf.scene;
    scene.add(model);
    modelBasePosition.copy(model.position);
    model.traverse((node) => {
      if (node.isMesh) {
        node.castShadow = true;
        node.receiveShadow = true;
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        for (const material of materials) {
          if (material && 'roughness' in material) material.roughness = Math.max(material.roughness, 0.45);
        }
        if (node.name.trim().toLowerCase() === 'head_0') {
          const makeHeadLight = (source) => {
            const material = source.clone();
            if (material.color) material.color.set('#713cff');
            if (material.emissive) material.emissive.set('#713cff');
            if ('emissiveIntensity' in material) material.emissiveIntensity = 0.55;
            material.toneMapped = false;
            material.fog = false;
            return material;
          };
          node.material = Array.isArray(node.material)
            ? node.material.map(makeHeadLight)
            : makeHeadLight(node.material);
        }
      }
      const boneName = node.name.toLowerCase();
      if (node.isBone && (boneName.includes('breast_ctrl') || boneName.includes('butt_ctrl'))) {
        secondaryBones[node.name] = node;
        secondaryState[node.name] = { angle: 0, velocity: 0 };
        if (boneName.includes('butt_ctrl')) buttHitBones.push(node);
        if (boneName.includes('breast_ctrl')) breastHitBones.push(node);
      }
      if (node.isBone && boneName.includes('org-shoulder')) {
        const rest = node.quaternion.clone();
        const lowered = rest.clone().multiply(
          new THREE.Quaternion().setFromEuler(new THREE.Euler(
            THREE.MathUtils.degToRad(-10),
            0,
            THREE.MathUtils.degToRad(5),
            'XYZ',
          )),
        );
        idleShoulders.push({ bone: node, rest, lowered });
      }
      if (node.isBone) {
        if (boneName === 'def-spine.007_rig-haydee') faceHitBones.push(node);
        const legMatch = boneName.match(/^def-(thigh|shin|foot)\.([lr])_rig-haydee$/);
        if (legMatch) {
          idleLegs[`${legMatch[1]}_${legMatch[2]}`] = { bone: node, rest: node.quaternion.clone() };
          if (legMatch[1] === 'foot') feetHitBones.push(node);
        }
        if (boneName === 'def-spine.004_rig-haydee') {
          idleChest = { bone: node, restPosition: node.position.clone() };
          motionReferences.chest = node;
        }
        if (boneName === 'def-spine_rig-haydee') motionReferences.hips = node;
      }
    });
    const bounds = new THREE.Box3().setFromObject(model);
    const center = bounds.getCenter(new THREE.Vector3());
    const size = bounds.getSize(new THREE.Vector3());
    const height = Math.max(size.y, 0.08);
    modelCenter.copy(center);
    modelHeight = height;
    controls.target.copy(center).add(new THREE.Vector3(0, height * 0.04, 0));
    camera.position.set(
      center.x + height * 0.62,
      center.y + height * 0.16,
      center.z + height * 2.15,
    );
    controls.minDistance = height * 0.8;
    controls.maxDistance = height * 5;
    floor.position.set(center.x, bounds.min.y - height * 0.015, center.z);
    floor.scale.setScalar(height / 0.09 * 1.35);
    buildRoom(center, height, floor.position.y);
    new GLTFLoader().load(publicAsset('models/usb_stick.glb?v=head-accessory-54'), (usbGltf) => {
      const usbModel = usbGltf.scene;
      const sourceBounds = new THREE.Box3().setFromObject(usbModel);
      const sourceCenter = sourceBounds.getCenter(new THREE.Vector3());
      usbModel.position.copy(sourceCenter).multiplyScalar(-1);
      usbModel.scale.set(0.052, 0.0682, 0.06248);
      const pivot = new THREE.Group();
      pivot.add(usbModel);
      pivot.rotation.y = -Math.PI / 2;
      pivot.position.set(center.x - height * 0.40, bounds.max.y - height * 0.08, center.z - height * 0.08);
      pivot.visible = false;
      scene.add(pivot);
      usbAccessory = pivot;
    });
    controls.update();
    cameraHome.copy(camera.position);
    targetHome.copy(controls.target);
    mixer = new THREE.AnimationMixer(model);
    mixer.addEventListener('finished', (event) => {
      if (activeMotionMode === 'jump' && event.action === activeAction) {
        resetCharacter();
        succeed('Jump complete. Returned to idle.');
      }
    });
    squatClip = gltf.animations.find((clip) => /squat/i.test(clip.name)) || gltf.animations[0];
    walkClip = gltf.animations.find((clip) => /walk/i.test(clip.name));
    jumpClip = gltf.animations.find((clip) => /jump/i.test(clip.name));
    twerkClip = gltf.animations.find((clip) => /twerk/i.test(clip.name));
    status.textContent = squatClip
      ? `IDLE v4 // chest-only breathing + natural leg fidgets // ${Object.keys(secondaryBones).length} motion bones`
      : 'Character ready // no animation found';
    result.textContent = 'Ready. Try “walk”.';
  },
  (event) => {
    if (event.total) status.textContent = `Loading character… ${Math.round(event.loaded / event.total * 100)}%`;
  },
  () => {
    status.textContent = 'Could not load character';
    result.textContent = 'Model loading failed. Start the site through its local server.';
    result.dataset.state = 'error';
  },
);

function playSquat() {
  leaveXMode();
  if (!mixer || !squatClip) return fail('The squat animation is not ready yet.');
  if (activeAction) activeAction.stop();
  isSquatting = true;
  activeMotionMode = 'squat';
  currentFidget = null;
  model.position.copy(modelBasePosition);
  model.rotation.z = 0;
  activeAction = mixer.clipAction(squatClip);
  activeAction.reset().setLoop(THREE.LoopOnce, 1).setEffectiveTimeScale(0.82).fadeIn(0.14).play();
  activeAction.clampWhenFinished = true;
  const rearTarget = targetHome.clone().add(new THREE.Vector3(0, -modelHeight * 0.04, 0));
  const rearOffset = cameraHome.clone().sub(targetHome);
  rearOffset.z *= -1;
  rearOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI * 0.32);
  rearOffset.multiplyScalar(1.0);
  camera.position.copy(rearTarget).add(rearOffset);
  controls.target.copy(rearTarget);
  controls.update();
  status.textContent = `SQUAT v19 // rear camera // ${Object.keys(secondaryBones).length} motion bones`;
  succeed('Executing: squat');
}

