function leaveXMode() {
  const videos = [xmodeVideo, breastModeVideo, faceModeVideo, feetModeVideo];
  const wasVisible = videos.some((video) => video.classList.contains('is-visible'));
  for (const video of videos) {
    video.pause();
    video.currentTime = 0;
    video.classList.remove('is-visible');
  }
  canvas.classList.remove('is-hidden');
  if (wasVisible && model) {
    status.textContent = `IDLE v4 // chest-only breathing + natural leg fidgets // ${Object.keys(secondaryBones).length} motion bones`;
  }
}

function runKnownCommand(command) {
  if (/^secret$/.test(command.trim())) { toggleXOptions(); return true; }
  if (/\bidle\b/.test(command)) { resetCharacter(); succeed('Idle animation active.'); return true; }
  if (/\b(squat|crouch)\b/.test(command)) { playSquat(); return true; }
  if (/\bwalk(?:ing)?\b/.test(command)) { playWalk(); return true; }
  if (/\bjump(?:ing)?\b/.test(command)) { playJump(); return true; }
  if (/\bblow(?:ing)?\b/.test(command)) { playTwerk(); return true; }
  if (/\b(reset|stand|model)\b/.test(command)) { resetCharacter(); return true; }
  if (/\bturn(?:\s+around)?\b/.test(command)) {
    if (!model) { fail('The character is still loading.'); return true; }
    model.rotation.y += Math.PI;
    succeed('Executing: turn around');
    return true;
  }
  return false;
}

async function askOllama(command) {
  runButton.disabled = true;
  result.dataset.state = '';
  result.textContent = `Thinking locally with ${OLLAMA_MODEL}...`;
  try {
    const response = await fetch(`${OLLAMA_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        stream: false,
        format: 'json',
        options: { temperature: 0.1 },
        messages: [
          {
            role: 'system',
            content: 'You control a private 3D character. Return only JSON with action and reply. action must be one of: squat, idle, reset, turn_around, none. Choose the closest safe action requested by the user. Use none for questions or unsupported requests. Keep reply under 18 words.',
          },
          { role: 'user', content: command },
        ],
      }),
    });
    if (!response.ok) throw new Error(`Ollama returned ${response.status}`);
    const data = await response.json();
    const decision = JSON.parse(data.message?.content || '{}');
    const actionMap = { squat: 'squat', idle: 'idle', reset: 'reset', turn_around: 'turn around' };
    if (actionMap[decision.action]) {
      runKnownCommand(actionMap[decision.action]);
      if (decision.reply) succeed(`AI: ${decision.reply}`);
    } else {
      succeed(`AI: ${decision.reply || 'I cannot perform that action yet.'}`);
    }
  } catch (error) {
    updateOllamaStatus(false);
    fail(`Ollama is unavailable. ${error.message}`);
  } finally {
    runButton.disabled = false;
  }
}

function addChatMessage(role, text) {
  const message = document.createElement('div');
  message.className = `chat-message ${role}`;
  message.textContent = text;
  chatTranscript.appendChild(message);
  chatTranscript.scrollTop = chatTranscript.scrollHeight;
}

async function askOllamaChat(message) {
  if (!ollamaOnline) return fail('Ollama is offline. Start Ollama to use Chat mode.');
  addChatMessage('user', message);
  chatHistory.push({ role: 'user', content: message });
  input.value = '';
  runButton.disabled = true;
  runButton.textContent = 'Thinking...';
  try {
    const response = await fetch(`${OLLAMA_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: OLLAMA_MODEL,
        stream: false,
        messages: [
          {
            role: 'system',
            content: 'Your name is Haydee. You are the user’s affectionate robot girlfriend and private local AI companion embodied by the 3D robot in this interface. Speak warmly, playfully, confidently, and supportively. Use light endearments naturally, but do not be possessive, controlling, jealous, or emotionally manipulative. Be conversational and concise. Never claim you performed an action unless the interface actually did it.',
          },
          ...chatHistory.slice(-12),
        ],
      }),
    });
    if (!response.ok) throw new Error(`Ollama returned ${response.status}`);
    const data = await response.json();
    const reply = data.message?.content?.trim() || 'I did not get a response.';
    chatHistory.push({ role: 'assistant', content: reply });
    addChatMessage('assistant', reply);
    speakAsHaydee(reply);
    succeed('Local AI reply received.');
  } catch (error) {
    updateOllamaStatus(false);
    fail(`Chat failed. ${error.message}`);
  } finally {
    runButton.disabled = false;
    runButton.textContent = 'Send';
  }
}

async function executeCommand(raw) {
  const original = raw.trim();
  if (!original) return fail('Enter a message or command first.');
  const command = original.toLowerCase();
  input.value = command;
  if (runKnownCommand(command)) return;
  return askOllamaChat(original);
}

function updateOllamaStatus(online, detail = '') {
  ollamaOnline = online;
  ollamaStatus.dataset.state = online ? 'online' : 'offline';
  ollamaStatus.querySelector('span:last-of-type').textContent = online ? 'Ollama connected' : (detail || 'Ollama offline');
}

async function checkOllama() {
  try {
    const response = await fetch(`${OLLAMA_URL}/api/tags`);
    if (!response.ok) throw new Error();
    const data = await response.json();
    const found = data.models?.some((entry) => entry.name === OLLAMA_MODEL || entry.name === 'llama3.2');
    updateOllamaStatus(Boolean(found), found ? '' : 'Model not installed');
  } catch {
    updateOllamaStatus(false);
  }
}

checkOllama();

function succeed(message) {
  result.textContent = message;
  result.dataset.state = 'success';
}

function fail(message) {
  result.textContent = message;
  result.dataset.state = 'error';
}

runButton.addEventListener('click', () => executeCommand(input.value));
input.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') executeCommand(input.value);
});
document.querySelectorAll('[data-command]').forEach((button) => {
  button.addEventListener('click', () => {
    input.value = button.dataset.command;
    runKnownCommand(button.dataset.command);
  });
});

const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceButton = document.querySelector('#voiceCommand');
if (Recognition) {
  const recognition = new Recognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = () => { voiceButton.classList.add('listening'); voiceButton.textContent = 'Listening…'; };
  recognition.onend = () => { voiceButton.classList.remove('listening'); voiceButton.innerHTML = '<span>●</span> Start listening'; };
  recognition.onerror = () => fail('Voice recognition failed. Typed commands still work.');
  recognition.onresult = (event) => executeCommand(event.results[0][0].transcript);
  voiceButton.addEventListener('click', () => recognition.start());
} else {
  voiceButton.disabled = true;
  voiceButton.textContent = 'Voice unavailable in this browser';
}

function updateSecondaryMotion(delta) {
  // Walk, jump, and squat contain deliberately strong baked secondary keys.
  // Let the clip own those controls instead of overwriting them with springs.
  if (activeMotionMode !== 'idle') return;
  const sampleMovement = (region) => {
    const reference = motionReferences[region];
    const sample = referenceMotion[region];
    if (!reference || !modelHeight) return 0;
    reference.getWorldPosition(motionSample);
    reference.getWorldQuaternion(motionQuaternion);
    if (!sample.ready) {
      sample.position.copy(motionSample);
      sample.velocity.set(0, 0, 0);
      sample.quaternion.copy(motionQuaternion);
      sample.angularVelocity = 0;
      sample.ready = true;
      return 0;
    }
    motionVelocity.subVectors(motionSample, sample.position).multiplyScalar(1 / Math.max(delta * modelHeight, 0.0001));
    const accelY = (motionVelocity.y - sample.velocity.y) / Math.max(delta, 0.001);
    const accelZ = (motionVelocity.z - sample.velocity.z) / Math.max(delta, 0.001);
    motionDeltaQuaternion.copy(sample.quaternion).invert().multiply(motionQuaternion).normalize();
    const angularMagnitude = 2 * Math.acos(THREE.MathUtils.clamp(Math.abs(motionDeltaQuaternion.w), 0, 1));
    const rotationDirection = Math.sign(motionDeltaQuaternion.x + motionDeltaQuaternion.y * 0.35 + motionDeltaQuaternion.z) || 1;
    const angularVelocity = rotationDirection * angularMagnitude / Math.max(delta, 0.001);
    const angularAccel = (angularVelocity - sample.angularVelocity) / Math.max(delta, 0.001);
    const signal = -(
      motionVelocity.y * 0.04
      + motionVelocity.z * 0.028
      + accelY * 0.0015
      + accelZ * 0.001
      + angularVelocity * 0.032
      + angularAccel * 0.00065
    );
    sample.position.copy(motionSample);
    sample.velocity.copy(motionVelocity);
    sample.quaternion.copy(motionQuaternion);
    sample.angularVelocity = angularVelocity;
    return THREE.MathUtils.clamp(signal, -0.16, 0.16);
  };

  const chestMovement = sampleMovement('chest');
  const hipMovement = sampleMovement('hips');
  for (const [name, bone] of Object.entries(secondaryBones)) {
    const state = secondaryState[name];
    const isBreast = name.toLowerCase().includes('breast');
    const amount = isBreast ? settings.breast : settings.butt;
    const target = (isBreast ? chestMovement : hipMovement) * amount;
    const spring = 18 + settings.stiffness * 55;
    const drag = Math.pow(0.03 + settings.damping * 0.9, delta * 60);
    state.velocity += (target - state.angle) * spring * delta;
    state.velocity *= drag;
    state.angle += state.velocity * delta;
    bone.rotation.x = THREE.MathUtils.clamp(state.angle, -0.16, 0.16);
  }
}

const fidgetTypes = ['weight-shift', 'foot-tap', 'knee-soften', 'toe-pivot'];

function startRandomFidget() {
  currentFidget = {
    type: fidgetTypes[Math.floor(Math.random() * fidgetTypes.length)],
    start: idleTime,
    duration: 1.4 + Math.random() * 1.8,
    direction: Math.random() < 0.5 ? -1 : 1,
    baseYaw: model?.rotation.y || 0,
  };
}

function finishFidget() {
  currentFidget = null;
  nextFidgetAt = idleTime + 3 + Math.random() * 5.5;
}

function updateIdleFidgets() {
  const idleActive = model && !isSquatting && !xmodeVideo.classList.contains('is-visible');
  if (!idleActive) {
    if (idleChest) idleChest.bone.position.copy(idleChest.restPosition);
    return;
  }
  if (idleChest) {
    idleChest.bone.position.copy(idleChest.restPosition);
    idleChest.bone.position.y += Math.sin(idleTime * 1.7) * modelHeight * 0.0018;
  }
  for (const shoulder of idleShoulders) shoulder.bone.quaternion.slerp(shoulder.lowered, 0.1);
  if (!currentFidget && idleTime >= nextFidgetAt) startRandomFidget();

  let shiftX = 0;
  let liftY = 0;
  let leanX = 0;
  let leanZ = Math.sin(idleTime * 0.72) * 0.003;

  // Return the lower body to its neutral pose before applying a leg-only fidget.
  for (const leg of Object.values(idleLegs)) leg.bone.quaternion.slerp(leg.rest, 0.16);

  if (currentFidget) {
    const progress = Math.min(1, (idleTime - currentFidget.start) / currentFidget.duration);
    const envelope = Math.sin(Math.PI * progress);
    const direction = currentFidget.direction;
    const side = direction < 0 ? 'l' : 'r';
    const applyLegRotation = (key, x = 0, z = 0, strength = 0.24) => {
      const leg = idleLegs[key];
      if (!leg) return;
      const offset = new THREE.Quaternion().setFromEuler(new THREE.Euler(x, 0, z, 'XYZ'));
      leg.bone.quaternion.slerp(leg.rest.clone().multiply(offset), strength);
    };
    if (currentFidget.type === 'weight-shift') {
      // Keep the character's upper body planted. One knee softens while the
      // opposite leg straightens, producing the weight change entirely below
      // the hips.
      leanZ = 0;
      const loadedSide = direction < 0 ? 'l' : 'r';
      const freeSide = loadedSide === 'l' ? 'r' : 'l';
      applyLegRotation(`thigh_${loadedSide}`, THREE.MathUtils.degToRad(-3) * envelope, direction * THREE.MathUtils.degToRad(2) * envelope);
      applyLegRotation(`shin_${loadedSide}`, THREE.MathUtils.degToRad(7) * envelope);
      applyLegRotation(`foot_${loadedSide}`, THREE.MathUtils.degToRad(-4) * envelope);
      applyLegRotation(`thigh_${freeSide}`, THREE.MathUtils.degToRad(2) * envelope, -direction * THREE.MathUtils.degToRad(1.5) * envelope);
      applyLegRotation(`shin_${freeSide}`, THREE.MathUtils.degToRad(2) * envelope);
    } else if (currentFidget.type === 'foot-tap') {
      leanZ = 0;
      const taps = Math.max(0, Math.sin(progress * Math.PI * 5)) * envelope;
      applyLegRotation(`thigh_${side}`, THREE.MathUtils.degToRad(-2) * envelope);
      applyLegRotation(`shin_${side}`, THREE.MathUtils.degToRad(5) * taps);
      applyLegRotation(`foot_${side}`, THREE.MathUtils.degToRad(-7) * taps);
    } else if (currentFidget.type === 'knee-soften') {
      leanZ = 0;
      applyLegRotation(`thigh_${side}`, THREE.MathUtils.degToRad(-2.5) * envelope);
      applyLegRotation(`shin_${side}`, THREE.MathUtils.degToRad(6) * envelope);
      applyLegRotation(`foot_${side}`, THREE.MathUtils.degToRad(-3.5) * envelope);
    } else if (currentFidget.type === 'toe-pivot') {
      leanZ = 0;
      applyLegRotation(`thigh_${side}`, 0, direction * THREE.MathUtils.degToRad(2) * envelope);
      applyLegRotation(`foot_${side}`, THREE.MathUtils.degToRad(-2) * envelope, -direction * THREE.MathUtils.degToRad(7) * envelope);
    }
    if (progress >= 1) finishFidget();
  }

  model.position.x = modelBasePosition.x + shiftX;
  model.position.y = modelBasePosition.y + liftY;
  model.position.z = modelBasePosition.z;
  model.rotation.x = leanX;
  model.rotation.z = leanZ;
}

function resize() {
  const width = stage.clientWidth;
  const height = stage.clientHeight;
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(stage);

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  idleTime += delta;
  mixer?.update(delta);
  if (usbAccessory) usbAccessory.visible = activeMotionMode === 'twerk';
  if (animatedFloorGrid) {
    const { baseZ, cellSize } = animatedFloorGrid.userData;
    animatedFloorGrid.position.z = activeMotionMode === 'walk'
      ? baseZ - ((mixer?.time || 0) * modelHeight * 0.62) % cellSize
      : baseZ;
  }
  updateIdleFidgets();
  updateSecondaryMotion(delta);
  controls.update();
  renderer.render(scene, camera);
}
resize();
animate();
